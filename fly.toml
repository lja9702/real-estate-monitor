# fly.toml app configuration file generated for myhouse-dashboard on 2026-06-26T01:59:50+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'myhouse-dashboard'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  CLOUD_READONLY = '1'
  MYHOUSE_CONFIG = 'config.yaml'
  SYNC_PULL_INTERVAL_SECONDS = '600'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
