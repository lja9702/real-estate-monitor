# ───────────────────────────────────────────────────────────────────────────
# 네이버부동산 매물 모니터 설정 (비밀값 없음 — 텔레그램 토큰은 .env)
# 매물은 new.land.naver.com 에서 단지번호로 수집(헤드리스 브라우저가 토큰 자동 발급).
# ───────────────────────────────────────────────────────────────────────────
app:
  timezone: "Asia/Seoul"
  db_path: "data/myhouse.db"
  dashboard_url: "http://localhost:8765"   # 텔레그램 메시지에 넣을 대시보드 링크
  removal_debounce_hours: 20               # 이 시간 이상 연속 미노출이어야 '거래완료' 확정
  request_delay_seconds: [1.0, 3.0]        # 페이지 요청 사이 랜덤 지연(초)
  notify_on_no_change: false               # 변화 0건이어도 알림 보낼지
  headless: true                           # Playwright 브라우저 표시 여부(디버그 시 false)

# 모든 타겟에 공통 적용되는 기본 필터 (각 타겟의 overrides 로 덮어씀)
defaults:
  trade_types: ["SALE"]              # SALE(매매) | JEONSE(전세) | WOLSE(월세) — 복수 가능
  real_estate_type: "APT:ABYG:JGC"   # 아파트:분양권:재건축 (재건축 단지도 포함)
  area_excl_min_m2: null             # 전용면적(㎡) 하한 — null = 제한없음
  area_excl_max_m2: null
  area_supply_min_m2: 66             # 공급면적(㎡) 하한 (area1)
  area_supply_max_m2: 131            # 공급면적(㎡) 상한 (area1)
  price_max_manwon: 300000           # 매매가/보증금 상한 (만원). 30억 = 300000
  price_min_manwon: null
  floor_min: null                    # 최저층 (1층/반지하 제외 시 2)

# 실거래(국토부 실거래가 — 네이버 prices/real 경유) 수집 설정.
# 매물(호가)과 별개로 하루 1회 수집해 신규 실거래/취소를 텔레그램 알림 + /deals 화면에 표시.
deals:
  enabled: true              # 실거래 수집·알림 사용 여부
  trade_types: ["SALE"]      # SALE(매매)만 — 전세/월세도: ["SALE","JEONSE","WOLSE"]
  years: 3                   # 실거래 조회 기간(년). 최신 거래가 먼저 옴
  scope: "all"               # all(전체 추적단지) | starred(별표 단지만)
  use_area_filter: true      # 위 defaults 의 면적필터로 평형을 제한해 호출량↓
  notify_on_no_change: false # 신규 실거래 0건이어도 알림 보낼지

# 토지거래허가(서울시 land.seoul.go.kr) — 실거래의 *선행* 신호(거래완료·신고 전에 뜨는 허가).
# 추적단지가 있는 서울 자치구만 1회씩 조회(최대 62일)하고, 단지 대표지번에 매칭된 '허가'만 알림한다.
# ⚠️ 가격·면적은 없음(거래활성 신호) — 가격은 실거래로 확인. 단지 지번 백필은 실거래 수집이 자동 수행.
permits:
  enabled: true              # 토지거래허가 수집·알림 사용 여부
  days: 60                   # 조회 기간(일). 서버 제약상 최대 62 로 자동 캡
  scope: "all"               # all(전체 추적단지) | starred(별표 단지만)
  use_purpose_filter: true   # 이용목적=주거용만 매칭(아파트 거래로 한정)
  notify_on_no_change: false # 신규 허가 0건이어도 알림 보낼지

# 주간 신규편입 단지 탐색 (single-markers 지도 마커 기반).
# 지정 지역을 주 1회(launchd 월요일 09:00) 훑어 매매 15~26억·세대수≥300·공급 66~131㎡ 조건에
# '새로 든' 단지를 텔레그램 알림. 추가(추적)는 사용자가 /add 로 직접 한다. 첫 회차는 baseline(무알림).
# ⚠️ 라이브 검증(2026-06): cortarNo 는 서버측 필터가 아니라 bbox 가 유일한 지리 경계이고,
# bbox 1회 응답은 500개로 캡된다. 단 price/area/세대수 서버측 필터를 걸면 구당 1회로 캡 아래 완전수집.
# bbox = [leftLon, rightLon, topLat, bottomLat]. 누락/노이즈가 있으면 bbox 를 조여/넓혀 조정.
discover:
  enabled: true
  trade_type: "SALE"
  real_estate_type: "APT:ABYG:JGC"
  price_min_manwon: 150000     # 15억
  price_max_manwon: 260000     # 26억
  area_supply_min_m2: 66       # 마커 minArea/maxArea(공급 추정) 서버측 필터
  area_supply_max_m2: 131
  min_households: 300
  zoom: 13
  seed_complex_no: "947"       # 토큰 발급용 시드(방배 삼호1차)
  notify_on_no_change: false
  regions:
    - { name: "강남구", cortar_no: "1168000000", bbox: [127.01, 127.13, 37.55, 37.46] }
    - { name: "서초구", cortar_no: "1165000000", bbox: [126.98, 127.06, 37.52, 37.43] }
    - { name: "송파구", cortar_no: "1171000000", bbox: [127.06, 127.17, 37.54, 37.47] }
    - { name: "용산구", cortar_no: "1117000000", bbox: [126.95, 127.02, 37.56, 37.51] }
    - { name: "성동구", cortar_no: "1120000000", bbox: [127.01, 127.08, 37.58, 37.53] }
    - { name: "동작구", cortar_no: "1159000000", bbox: [126.92, 126.99, 37.52, 37.47] }
    - { name: "여의도", cortar_no: "1156000000", bbox: [126.91, 126.97, 37.54, 37.51] }
    - { name: "과천시", cortar_no: "4129000000", bbox: [126.98, 127.04, 37.45, 37.41] }

