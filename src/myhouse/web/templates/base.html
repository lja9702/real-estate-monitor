<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "myhouse" }} · 부동산 모니터</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">🏠 부동산 모니터</a>
    <nav>
      <a href="/">매물</a>
      <a href="/deals">실거래가</a>
      <a href="/permits">토지거래허가</a>
      <a href="/shortlist">★ 관심단지</a>
      <a href="/map">지도</a>
      <a href="/complexes">추적단지</a>
      <a href="/runs">실행로그</a>
    </nav>
    <button class="btn run" onclick="runNow(this)">지금 수집</button>
    <button class="btn ghost" onclick="runDeals(this)" title="국토부 실거래가 수집">실거래 수집</button>
    <button class="btn ghost" onclick="runPermits(this)" title="토지거래허가 수집">허가 수집</button>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <dialog id="histModal">
    <div class="modal-head">
      <strong>가격 이력</strong>
      <button onclick="document.getElementById('histModal').close()">✕</button>
    </div>
    <div id="histBody"></div>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
