{% extends "base.html" %}
{% block content %}
<style>
  #map-wrap {
    position: relative;
    height: calc(100vh - 56px);
  }
  #map {
    width: 100%;
    height: 100%;
  }
  #map-filter {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 10;
    background: white;
    border-radius: 8px;
    padding: 10px 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    display: flex;
    gap: 14px;
    align-items: center;
    font-size: .9em;
  }
  #map-filter label {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  #map-count {
    color: #888;
    font-size: .85em;
    border-left: 1px solid #ddd;
    padding-left: 12px;
  }
  #map-legend {
    position: absolute;
    bottom: 28px;
    left: 12px;
    z-index: 10;
    background: white;
    border-radius: 8px;
    padding: 8px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    font-size: .8em;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
    flex-shrink: 0;
  }
  #map-no-key, #map-no-data {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff3cd;
    padding: 24px 32px;
    border-radius: 10px;
    text-align: center;
    line-height: 1.7;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  #map-no-data {
    background: #f8f9fa;
  }
</style>

<div id="map-wrap">
  {% if not naver_map_key %}
  <div id="map-no-key">
    ⚠️ 네이버 지도 API 키 미설정<br>
    <code>.env</code>에 <code>NAVER_MAP_CLIENT_ID=...</code>를 추가하고 서버를 재시작하세요.<br>
    <small style="color:#888">NCP 발급: console.ncloud.com → Application → Maps API</small>
  </div>
  {% else %}
  <div id="map-filter">
    <label><input type="checkbox" value="매매" checked onchange="applyFilter()"> 매매</label>
    <label><input type="checkbox" value="전세" checked onchange="applyFilter()"> 전세</label>
    <label><input type="checkbox" value="월세" checked onchange="applyFilter()"> 월세</label>
    <span id="map-count"></span>
  </div>

  <div id="map-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> 매물 3건+</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4fa3e0"></div> 매물 1–2건</div>
    <div class="legend-item"><div class="legend-dot" style="background:#aaa"></div> 매물 없음</div>
  </div>

  <div id="map"></div>

  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId={{ naver_map_key }}"></script>
  <script>
    let allData = [], markers = [], infoWindow;

    function markerColor(count) {
      if (count === 0) return '#aaa';
      if (count <= 2) return '#4fa3e0';
      return '#2ecc71';
    }

    function markerIcon(color) {
      return {
        content: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 3px rgba(0,0,0,.4)"></div>`,
        anchor: new naver.maps.Point(7, 7),
      };
    }

    // 팝업 닫기 (X 버튼에서 호출)
    function closeInfoWindow() {
      if (infoWindow) infoWindow.close();
    }

    function applyFilter() {
      const checked = new Set(
        [...document.querySelectorAll('#map-filter input:checked')].map(el => el.value)
      );
      let visible = 0;
      markers.forEach((m, i) => {
        const d = allData[i];
        const show = checked.size === 0 || d.trade_types.length === 0 || d.trade_types.some(t => checked.has(t));
        m.setVisible(show);
        if (show) visible++;
      });
      document.getElementById('map-count').textContent = `${visible}개 단지`;
    }

    function priceLabel(row) {
      if (row.min_price == null) return '가격 없음';
      const fmt = p => p >= 10000 ? `${(p / 10000).toFixed(1)}억` : `${p}만`;
      return row.min_price === row.max_price
        ? fmt(row.min_price)
        : `${fmt(row.min_price)} ~ ${fmt(row.max_price)}`;
    }

    fetch('/api/map-data')
      .then(r => r.json())
      .then(data => {
        allData = data;

        if (!data.length) {
          document.getElementById('map').innerHTML =
            '<div id="map-no-data">좌표가 설정된 단지가 없습니다.<br><small>수집 실행 시 자동으로 채워지거나<br><code>myhouse fill-coords</code>를 실행하세요.</small></div>';
          document.getElementById('map-count').textContent = '0개 단지';
          return;
        }

        const centerLat = data.reduce((s, d) => s + d.lat, 0) / data.length;
        const centerLon = data.reduce((s, d) => s + d.lon, 0) / data.length;

        const map = new naver.maps.Map('map', {
          zoom: 12,
          center: new naver.maps.LatLng(centerLat, centerLon),
        });

        infoWindow = new naver.maps.InfoWindow({ anchorSkew: true });

        // 단지 마커가 아닌 빈 지도 영역을 클릭하면 팝업 닫기
        naver.maps.Event.addListener(map, 'click', closeInfoWindow);

        data.forEach((d, i) => {
          const m = new naver.maps.Marker({
            position: new naver.maps.LatLng(d.lat, d.lon),
            map,
            icon: markerIcon(markerColor(d.active_count)),
            title: d.name,
          });
          markers.push(m);

          naver.maps.Event.addListener(m, 'click', () => {
            const trades = d.trade_types.join(', ') || '—';
            const newBadge = d.new_count ? ` <span style="color:#e74c3c;font-size:.8em">(신규 ${d.new_count})</span>` : '';
            const naverUrl = `https://new.land.naver.com/complexes/${d.complex_no}`;
            infoWindow.setContent(`
              <div style="position:relative;padding:12px 30px 10px 14px;min-width:170px;font-size:.9em;line-height:1.6">
                <a href="javascript:void(0)" onclick="closeInfoWindow()" title="닫기"
                   style="position:absolute;top:6px;right:8px;color:#bbb;font-size:1.15em;font-weight:bold;text-decoration:none;line-height:1">✕</a>
                <a href="${naverUrl}" target="_blank" rel="noopener"
                   style="font-size:1em;font-weight:bold;color:#03c75a;text-decoration:none">${d.name} ↗</a><br>
                ${d.meta_line ? `<span style="color:#aaa;font-size:.8em">${d.meta_line}</span><br>` : ''}
                <span style="color:#888">${trades}</span><br>
                활성 매물: <b>${d.active_count}건</b>${newBadge}<br>
                가격: ${priceLabel(d)}<br>
                <a href="/complex/${d.complex_no}" style="font-size:.85em;color:#4fa3e0">단지 보기 →</a>
              </div>`);
            infoWindow.open(map, m);
          });
        });

        applyFilter();
      })
      .catch(err => {
        console.error('지도 데이터 로드 실패:', err);
      });
  </script>
  {% endif %}
</div>
{% endblock %}
