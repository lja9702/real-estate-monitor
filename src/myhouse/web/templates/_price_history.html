{% if spark %}
<svg class="spark" viewBox="0 0 {{ spark.w }} {{ spark.h }}" width="{{ spark.w }}" height="{{ spark.h }}">
  <polyline points="{{ spark.poly }}" fill="none" stroke="#2d6cdf" stroke-width="2"/>
  {% for p in spark.pts %}
    <circle cx="{{ p.x }}" cy="{{ p.y }}" r="3" fill="#2d6cdf"><title>{{ p.date }} · {{ p.price|manwon }}</title></circle>
  {% endfor %}
</svg>
<div class="muted small">최저 {{ spark.lo|manwon }} · 최고 {{ spark.hi|manwon }}</div>
{% endif %}
<table class="hist">
  <thead><tr><th>일자</th><th>이벤트</th><th>가격(만원)</th></tr></thead>
  <tbody>
  {% for p in points %}
    <tr><td>{{ p.date }}</td><td>{{ p.event }}</td><td>{{ p.price|manwon }}</td></tr>
  {% else %}
    <tr><td colspan="3" class="empty">이력이 없습니다.</td></tr>
  {% endfor %}
  </tbody>
</table>
